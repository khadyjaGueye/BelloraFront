<div class="container-login">
    <div class="card-login">
        <div class="left-panel">
            <div class="text-center mb-4">
                <a routerLink="/"> <img src="assets/img/sac.jpeg" alt="Logo" class="logo"></a>
                <h4>Connexion</h4>
            </div>
            <form [formGroup]="form" (ngSubmit)="onSubmit()">
                <div class="mb-3">
                    <label for="username" class="form-label">Nom d'utilisateur</label>
                    <input type="text" formControlName="email" class="form-control" id="username" placeholder="Entrez votre nom">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Mot de passe</label>

                    <div class="d-flex justify-content-between align-items-center ">

                        <div class="input-group">
                            <input [type]="showPassword ? 'text' : 'password'"  formControlName="password" class="form-control" id="password"
                                placeholder="Entrez votre mot de passe">
                            <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()">
                                <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-custom w-100">
                    <span *ngIf="!isLoading"> Se connecter</span>
                        <span *ngIf="isLoading">
                            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                             Se connecter...
                        </span>
                </button>
            </form>
        </div>

        <div class="right-panel">
            <h3>Bienvenue !</h3>
            <p>Pas encore de compte ?</p>
            <a routerLink="/auth/register" class="btn btn-light">S'inscrire</a>
        </div>
    </div>
</div>
