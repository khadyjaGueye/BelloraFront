<section class="categories-section py-5">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="fw-bold">Nos Catégories</h2>
      <p class="text-muted">
        Découvrez nos collections soigneusement sélectionnées
      </p>
    </div>
    <div class="row g-4">
      <div class="col-6 col-md-3" *ngFor="let category of categories">
        <div class="category-card" (click)="onCategoryClick(category.id)">
          <img [src]="category.image" alt="{{category.name}}">
          <h5>{{category.name}}</h5>
        </div>
      </div>
    </div>
  </div>
</section>
