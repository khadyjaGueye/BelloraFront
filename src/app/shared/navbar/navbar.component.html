<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
  <div class="container">

    <a class="navbar-brand fw-bold logo" routerLink="/">
      Bellora
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">

      <ul class="navbar-nav mx-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/">Accueil</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/products">Parfums</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/products">Accessoires</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/products">Nouveautés</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/contact">Contact</a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-3">

        <i class="bi bi-search fs-5"></i>

        <i class="bi bi-heart fs-5"></i>

        <a routerLink="/cart" class="cart-icon position-relative text-dark text-decoration-none"
          [class.animate]="animate">
          <i class="bi bi-cart3 fs-4"></i>
          @if(cartCount > 0){
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            {{ cartCount }}
          </span>
          }
        </a>

        <!-- Si pas connecté -->
        <button *ngIf="!utilService.isLoggedIn()" class="btn btn-outline-dark rounded-pill" routerLink="/login">
          Connexion
        </button>
        <button *ngIf="!utilService.isLoggedIn()" class="btn btn-outline-dark rounded-pill" routerLink="/register">
          Register
        </button>

        <!-- Si connecté -->
        <button *ngIf="utilService.isLoggedIn()" class="btn btn-outline-dark rounded-pill" (click)="logout()">
          Déconnexion
        </button>
        <a *ngIf="utilService.isLoggedIn()" routerLink="/profile" class="btn btn-outline-dark rounded-pill">
          <i class="bi bi-person-circle"></i>
        </a>

      </div>

    </div>

  </div>
</nav>
