<div class="wrapper">

  <!-- Sidebar -->
  <aside class="sidebar" [class.active]="sidebarOpen">
    <div class="logo">
      <h3>Bellora</h3>
    </div>

    <ul class="nav flex-column mt-4">
      <li class="nav-item">
        <a (click)="displayDashbord()" class="nav-link" [class.active]="display==='dashbord'">
          <i class="bi bi-house-door"></i> Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a (click)="displayProducts()" class="nav-link" [class.active]="display==='product'">
          <i class="bi bi-box"></i> Produits
        </a>
      </li>
      <li class="nav-item">
        <a (click)="displayCategory()" class="nav-link" [class.active]="display==='category'">
          <i class="bi bi-grid"></i> Catégories
        </a>
      </li>
      <li class="nav-item">
        <a (click)="displayOrders()" class="nav-link" [class.active]="display==='order'">
          <i class="bi bi-cart"></i> Commandes
        </a>
      </li>
      <li class="nav-item">
        <a (click)="displayCustomers()" class="nav-link" [class.active]="display==='customer'">
          <i class="bi bi-people"></i> Clients
        </a>
      </li>
      <li class="nav-item">
        <a (click)="displayUser()" class="nav-link" [class.active]="display==='user'">
          <i class="bi bi-person-circle"></i> Utilisateur
        </a>
      </li>
    </ul>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
      <div class="container-fluid d-flex justify-content-between align-items-center">

        <!-- Bouton hamburger visible uniquement sur mobile -->
        <button class="btn btn-light d-lg-none" (click)="toggleSidebar()">
          <i class="bi bi-list"></i>
        </button>

        <h4 class="mb-0">Administration Bellora</h4>

        <div class="d-flex align-items-center gap-4">
          <i class="bi bi-bell fs-5"></i>
          <i class="bi bi-gear fs-5"></i>

          <div class="dropdown">
            <button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">
              Admin
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item">Profil</a></li>
              <li><a class="dropdown-item text-danger">Déconnexion</a></li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <!-- Contenu -->
    <div class="container-fluid p-4">
      <div [ngSwitch]="display">
        <app-static *ngSwitchCase="'dashbord'"></app-static>
        <app-products *ngSwitchCase="'product'"></app-products>
        <app-categories *ngSwitchCase="'category'"></app-categories>
        <app-orders *ngSwitchCase="'order'"></app-orders>
        <app-customers *ngSwitchCase="'customer'"></app-customers>
        <app-user *ngSwitchCase="'user'"></app-user>
      </div>
    </div>

  </div>
</div>
